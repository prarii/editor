<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Posts — openCMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f4f4f5;
    color: #111;
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    background: white;
    border-bottom: 1px solid #e4e4e7;
    padding: 0 28px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-brand {
    font-size: 15px;
    font-weight: 600;
    color: #111;
  }
  .topbar-brand span { color: #f97316; }

  /* ── Page body ── */
  .page { max-width: 900px; margin: 0 auto; padding: 36px 24px; }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .page-header h1 { font-size: 20px; font-weight: 600; }
  .page-header p { font-size: 13px; color: #888; margin-top: 2px; }

  /* ── Buttons ── */
  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: #111; color: white; }
  .btn-primary:hover { background: #333; }
  .btn-ghost { background: white; color: #555; border: 1px solid #e4e4e7; }
  .btn-ghost:hover { background: #f9f9f9; border-color: #ccc; }
  .btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
  .btn-danger:hover { background: #fecaca; }
  .btn-sm { font-size: 12px; padding: 5px 12px; }

  /* ── Posts table ── */
  .table-wrap {
    background: white;
    border: 1px solid #e4e4e7;
    border-radius: 8px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: #fafafa; border-bottom: 1px solid #e4e4e7; }
  th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 10px 16px;
  }
  td {
    padding: 14px 16px;
    font-size: 13px;
    border-bottom: 1px solid #f0f0f0;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .post-title { font-weight: 500; color: #111; }
  .post-excerpt { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px; }

  .status-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
  }
  .status-badge.draft     { background: #fef3c7; color: #92400e; }
  .status-badge.published { background: #dcfce7; color: #15803d; }
  .status-badge.review    { background: #dbeafe; color: #1d4ed8; }

  .tag-pill {
    display: inline-block;
    font-size: 10px;
    background: #f4f4f5;
    color: #555;
    border-radius: 3px;
    padding: 2px 7px;
    margin: 1px;
  }

  .row-actions { display: flex; gap: 6px; }

  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: #aaa;
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ══════════════════════════════════════
     MODAL OVERLAY
  ══════════════════════════════════════ */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 10px;
    width: 100%;
    max-width: 820px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to   { opacity: 1; transform: none; }
  }

  /* Modal header */
  .modal-header {
    padding: 18px 22px;
    border-bottom: 1px solid #e4e4e7;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .modal-header h2 { font-size: 16px; font-weight: 600; }

  .modal-header-right { display: flex; align-items: center; gap: 10px; }

  .close-btn {
    width: 30px; height: 30px;
    border: none; background: none;
    font-size: 18px; color: #888;
    cursor: pointer; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .close-btn:hover { background: #f4f4f5; color: #111; }

  /* Modal body — scrollable */
  .modal-body {
    overflow-y: auto;
    flex: 1;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Modal footer */
  .modal-footer {
    padding: 14px 22px;
    border-top: 1px solid #e4e4e7;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    background: #fafafa;
    border-radius: 0 0 10px 10px;
  }
  .modal-footer-left { font-size: 12px; color: #aaa; }

  /* ── Form fields inside modal ── */
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .field input[type="text"],
  .field textarea,
  .field select {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    border: 1px solid #e4e4e7;
    border-radius: 6px;
    padding: 9px 12px;
    outline: none;
    color: #111;
    background: white;
    transition: border-color 0.15s;
  }
  .field input:focus,
  .field textarea:focus,
  .field select:focus { border-color: #888; }

  #modalTitle { font-size: 18px; font-weight: 600; }
  #modalTitle::placeholder { color: #ccc; }

  .two-col { display: flex; gap: 12px; }
  .two-col .field { flex: 1; }

  /* Tags */
  .tag-wrap {
    border: 1px solid #e4e4e7;
    border-radius: 6px;
    padding: 5px 8px;
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    cursor: text; background: white; min-height: 38px;
    transition: border-color 0.15s;
  }
  .tag-wrap:focus-within { border-color: #888; }
  .m-tag {
    background: #f4f4f5; border-radius: 3px;
    padding: 2px 7px; font-size: 12px;
    display: flex; align-items: center; gap: 4px;
  }
  .m-tag-x { cursor: pointer; color: #aaa; font-size: 13px; line-height: 1; }
  .m-tag-x:hover { color: #333; }
  #modalTagInput {
    border: none; outline: none; background: none;
    font-family: 'Inter', sans-serif; font-size: 13px;
    min-width: 80px; flex: 1; padding: 2px 4px;
  }

  /* ── Editor inside modal ── */
  .editor-wrap {
    border: 1px solid #e4e4e7;
    border-radius: 6px;
    overflow: hidden;
  }

  .editor-topbar {
    padding: 8px 12px;
    background: #fafafa;
    border-bottom: 1px solid #e4e4e7;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .editor-topbar-label {
    font-size: 11px; font-weight: 600;
    color: #888; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .editor-controls { display: flex; align-items: center; gap: 10px; }

  /* MD toggle */
  .toggle-row { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #aaa; }
  .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
  .switch input { display: none; }
  .slider { position: absolute; inset: 0; background: #ccc; border-radius: 9px; cursor: pointer; transition: background 0.2s; }
  .slider::before { content: ''; position: absolute; width: 12px; height: 12px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; }
  input:checked + .slider { background: #111; }
  input:checked + .slider::before { transform: translateX(14px); }

  .upload-md-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px; padding: 4px 10px;
    border: 1px dashed #ddd; border-radius: 4px;
    background: none; color: #888; cursor: pointer;
    transition: all 0.15s;
  }
  .upload-md-btn:hover { border-color: #888; color: #333; }

  /* Toolbar */
  .toolbar {
    background: white;
    border-bottom: 1px solid #f0f0f0;
    padding: 6px 10px;
    display: flex; gap: 2px; flex-wrap: wrap; align-items: center;
  }
  .toolbar.dim { opacity: 0.3; pointer-events: none; }
  .tb-sep { width: 1px; height: 14px; background: #e4e4e7; margin: 0 3px; }
  .tb-btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px; padding: 3px 8px;
    border: 1px solid transparent; border-radius: 4px;
    background: none; color: #555; cursor: pointer;
    transition: all 0.12s;
  }
  .tb-btn:hover { background: #f4f4f5; border-color: #e4e4e7; }
  .tb-btn[data-cmd="bold"] { font-weight: 700; }
  .tb-btn[data-cmd="italic"] { font-style: italic; }

  /* Rich editor */
  #richEditor {
    min-height: 220px;
    max-height: 280px;
    overflow-y: auto;
    padding: 14px 16px;
    outline: none;
    font-size: 14px;
    line-height: 1.75;
    color: #111;
  }
  #richEditor:empty::before { content: attr(data-placeholder); color: #bbb; pointer-events: none; }
  #richEditor h1 { font-size: 22px; margin: 12px 0 6px; }
  #richEditor h2 { font-size: 16px; margin: 10px 0 5px; }
  #richEditor h3 { font-size: 14px; font-weight: 600; margin: 8px 0 4px; }
  #richEditor blockquote { border-left: 3px solid #e4e4e7; padding: 4px 12px; color: #666; font-style: italic; margin: 8px 0; }
  #richEditor ul, #richEditor ol { padding-left: 20px; margin: 6px 0; }
  #richEditor li { margin: 2px 0; }
  #richEditor code { font-family: monospace; background: #f4f4f5; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  #richEditor a { color: #f97316; text-decoration: underline; }
  #richEditor p { margin: 5px 0; }
  #richEditor strong { font-weight: 600; }

  /* MD textarea */
  #mdEditor {
    display: none;
    min-height: 220px;
    max-height: 280px;
    padding: 14px 16px;
    font-family: monospace;
    font-size: 12px;
    line-height: 1.8;
    color: #444;
    background: #fafafa;
    border: none; outline: none;
    width: 100%; resize: none;
  }

  /* Editor status bar */
  .editor-status {
    padding: 5px 12px;
    border-top: 1px solid #f0f0f0;
    display: flex; justify-content: space-between;
  }
  .editor-status span { font-size: 10px; color: #bbb; }

  /* Link modal (inner, inside the main modal) */
  .link-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .link-overlay.open { display: flex; }
  .link-box {
    background: white; border-radius: 8px;
    padding: 22px; width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .link-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .link-box p { font-size: 12px; color: #888; margin-bottom: 12px; }
  .link-box input {
    width: 100%; font-family: 'Inter', sans-serif; font-size: 13px;
    border: 1px solid #e4e4e7; border-radius: 5px;
    padding: 8px 10px; outline: none; margin-bottom: 12px;
  }
  .link-box input:focus { border-color: #888; }
  .link-box-btns { display: flex; justify-content: flex-end; gap: 8px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #111; color: white;
    font-size: 12px; padding: 9px 18px; border-radius: 6px;
    opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-brand">open<span>CMS</span></div>
  <span style="font-size:12px;color:#aaa">Blog Posts</span>
</div>

<!-- Page -->
<div class="page">
  <div class="page-header">
    <div>
      <h1>Posts</h1>
      <p id="postCountLabel">0 posts</p>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Post</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Tags</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="postsTableBody">
        <!-- rows injected here -->
      </tbody>
    </table>
    <div class="empty-state" id="emptyState">
      <div class="icon">📝</div>
      <p>No posts yet. Click <strong>+ Add Post</strong> to create your first one.</p>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     ADD POST MODAL
══════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">

    <div class="modal-header">
      <h2>Add Post</h2>
      <div class="modal-header-right">
        <span id="modalModeLabel" style="font-size:11px;color:#aaa;font-weight:500"></span>
        <button class="close-btn" onclick="closeModal()" title="Close">×</button>
      </div>
    </div>

    <div class="modal-body">

      <!-- Title -->
      <div class="field">
        <label>Title <span style="color:#f97316">*</span></label>
        <input type="text" id="modalTitle" placeholder="Your post title…" autocomplete="off">
      </div>

      <!-- Content editor -->
      <div class="field">
        <div class="editor-wrap">

          <div class="editor-topbar">
            <span class="editor-topbar-label">Content <span style="color:#f97316">*</span></span>
            <div class="editor-controls">
              <button class="upload-md-btn" onclick="document.getElementById('mdFileInput').click()">↑ Upload .md</button>
              <input type="file" id="mdFileInput" accept=".md,.txt" style="display:none">
              <div class="toggle-row">
                MD
                <label class="switch">
                  <input type="checkbox" id="modeToggle">
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>

          <div class="toolbar" id="toolbar">
            <button class="tb-btn" data-cmd="bold"           title="Bold — select text first">B</button>
            <button class="tb-btn" data-cmd="italic"         title="Italic — select text first">I</button>
            <button class="tb-btn" data-cmd="underline"      title="Underline — select text first">U</button>
            <button class="tb-btn" data-cmd="strikeThrough"  title="Strikethrough — select text first">S̶</button>
            <div class="tb-sep"></div>
            <button class="tb-btn" data-cmd="h1">H1</button>
            <button class="tb-btn" data-cmd="h2">H2</button>
            <button class="tb-btn" data-cmd="h3">H3</button>
            <div class="tb-sep"></div>
            <button class="tb-btn" data-cmd="blockquote">"</button>
            <button class="tb-btn" data-cmd="insertUnorderedList">• List</button>
            <button class="tb-btn" data-cmd="insertOrderedList">1. List</button>
            <div class="tb-sep"></div>
            <button class="tb-btn" data-cmd="createLink">🔗 Link</button>
            <button class="tb-btn" data-cmd="removeFormat">✕ Clear</button>
          </div>

          <div id="richEditor" contenteditable="true" data-placeholder="Start writing… (select text, then use toolbar)"></div>
          <textarea id="mdEditor" spellcheck="false" placeholder="# Write markdown here…"></textarea>

          <div class="editor-status">
            <span id="editorModeSpan">Rich Text</span>
            <span id="wordCount">0 words</span>
          </div>
        </div>
      </div>

      <!-- Excerpt + Status row -->
      <div class="two-col">
        <div class="field">
          <label>Excerpt</label>
          <textarea id="modalExcerpt" rows="2" placeholder="Short summary…" maxlength="300" style="resize:none"></textarea>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="modalStatus">
            <option value="draft">Draft</option>
            <option value="review">In Review</option>
            <option value="published">Published</option>
          </select>
        </div>
      </div>

      <!-- Tags -->
      <div class="field">
        <label>Tags</label>
        <div class="tag-wrap" onclick="document.getElementById('modalTagInput').focus()">
          <div id="modalTagsEl"></div>
          <input id="modalTagInput" placeholder="Type a tag, press Enter…">
        </div>
      </div>

    </div><!-- /modal-body -->

    <div class="modal-footer">
      <span class="modal-footer-left" id="footerHint">All content is stored as Markdown</span>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-ghost" onclick="savePost('draft')">Save Draft</button>
        <button class="btn btn-primary" onclick="savePost('published')">Publish</button>
      </div>
    </div>

  </div>
</div>

<!-- Link sub-modal -->
<div class="link-overlay" id="linkOverlay">
  <div class="link-box">
    <h3>Insert Link</h3>
    <p>Select text in the editor first, then paste your URL.</p>
    <input type="text" id="linkUrlInput" placeholder="https://example.com">
    <div class="link-box-btns">
      <button class="btn btn-ghost btn-sm" onclick="closeLink()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="applyLink()">Insert</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let posts        = [];   // all posts stored here (until API is ready)
let tags         = [];
let isMarkdown   = false;
let savedSel     = null; // for link insertion

/* ══════════════════════════════════════
   ELEMENTS
══════════════════════════════════════ */
const richEditor  = document.getElementById('richEditor');
const mdEditor    = document.getElementById('mdEditor');
const toggle      = document.getElementById('modeToggle');
const toolbar     = document.getElementById('toolbar');

/* ══════════════════════════════════════
   MODAL OPEN / CLOSE
══════════════════════════════════════ */
function openModal() {
  // Reset everything
  document.getElementById('modalTitle').value   = '';
  document.getElementById('modalExcerpt').value = '';
  document.getElementById('modalStatus').value  = 'draft';
  richEditor.innerHTML = '';
  mdEditor.value       = '';
  tags = []; renderTags();
  if (isMarkdown) { toggle.checked = false; toggle.dispatchEvent(new Event('change')); }
  updateWordCount();

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('modalTitle').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// Close on backdrop click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

/* ══════════════════════════════════════
   TOOLBAR
══════════════════════════════════════ */
toolbar.querySelectorAll('.tb-btn').forEach(btn => {
  btn.addEventListener('mousedown', e => {
    e.preventDefault(); // keep focus in editor
    const cmd = btn.dataset.cmd;
    if      (cmd === 'h1')         document.execCommand('formatBlock', false, 'h1');
    else if (cmd === 'h2')         document.execCommand('formatBlock', false, 'h2');
    else if (cmd === 'h3')         document.execCommand('formatBlock', false, 'h3');
    else if (cmd === 'blockquote') document.execCommand('formatBlock', false, 'blockquote');
    else if (cmd === 'createLink') openLink();
    else if (cmd === 'removeFormat') {
      document.execCommand('removeFormat', false, null);
      document.execCommand('formatBlock', false, 'p');
    }
    else document.execCommand(cmd, false, null);
    updateWordCount();
  });
});

/* ══════════════════════════════════════
   MODE TOGGLE
══════════════════════════════════════ */
toggle.addEventListener('change', () => {
  if (!isMarkdown) {
    mdEditor.value           = htmlToMarkdown(richEditor.innerHTML);
    richEditor.style.display = 'none';
    mdEditor.style.display   = 'block';
    toolbar.classList.add('dim');
    document.getElementById('editorModeSpan').textContent = 'Markdown';
    document.getElementById('modalModeLabel').textContent = 'MD mode';
    isMarkdown = true;
  } else {
    richEditor.innerHTML     = markdownToHtml(mdEditor.value);
    mdEditor.style.display   = 'none';
    richEditor.style.display = 'block';
    toolbar.classList.remove('dim');
    document.getElementById('editorModeSpan').textContent = 'Rich Text';
    document.getElementById('modalModeLabel').textContent = '';
    isMarkdown = false;
  }
  updateWordCount();
});

/* ══════════════════════════════════════
   FILE UPLOAD
══════════════════════════════════════ */
document.getElementById('mdFileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    const h1 = text.match(/^#\s+(.+)/m);
    if (h1 && !document.getElementById('modalTitle').value)
      document.getElementById('modalTitle').value = h1[1];
    if (!isMarkdown) { toggle.checked = true; toggle.dispatchEvent(new Event('change')); }
    mdEditor.value = text;
    updateWordCount();
    showToast('Loaded: ' + file.name);
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ══════════════════════════════════════
   LINK
══════════════════════════════════════ */
function openLink() {
  const sel = window.getSelection();
  if (sel.rangeCount) savedSel = sel.getRangeAt(0).cloneRange();
  if (!savedSel || savedSel.collapsed) { showToast('Select some text first, then click Link'); return; }
  document.getElementById('linkUrlInput').value = '';
  document.getElementById('linkOverlay').classList.add('open');
  setTimeout(() => document.getElementById('linkUrlInput').focus(), 50);
}
function closeLink() { document.getElementById('linkOverlay').classList.remove('open'); }
function applyLink() {
  const url = document.getElementById('linkUrlInput').value.trim();
  if (!url) { closeLink(); return; }
  richEditor.focus();
  if (savedSel) { const s = window.getSelection(); s.removeAllRanges(); s.addRange(savedSel); }
  document.execCommand('createLink', false, url);
  closeLink();
}
document.getElementById('linkOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('linkOverlay')) closeLink();
});

/* ══════════════════════════════════════
   TAGS
══════════════════════════════════════ */
document.getElementById('modalTagInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.value.trim()) {
    e.preventDefault();
    const val = e.target.value.trim();
    if (!tags.includes(val)) { tags.push(val); renderTags(); }
    e.target.value = '';
  }
  if (e.key === 'Backspace' && !e.target.value && tags.length) { tags.pop(); renderTags(); }
});
function renderTags() {
  document.getElementById('modalTagsEl').innerHTML =
    tags.map((t,i) => `<span class="m-tag">${t}<span class="m-tag-x" onclick="removeTag(${i})">×</span></span>`).join('');
}
function removeTag(i) { tags.splice(i,1); renderTags(); }

/* ══════════════════════════════════════
   WORD COUNT
══════════════════════════════════════ */
function updateWordCount() {
  const text = isMarkdown ? mdEditor.value : (richEditor.innerText || '');
  const n = text.trim().split(/\s+/).filter(w => w).length;
  document.getElementById('wordCount').textContent = n + ' words';
}
richEditor.addEventListener('input', updateWordCount);
mdEditor.addEventListener('input', updateWordCount);

/* ══════════════════════════════════════
   GET CONTENT (always as markdown)
══════════════════════════════════════ */
function getContent() {
  return isMarkdown ? mdEditor.value : htmlToMarkdown(richEditor.innerHTML);
}

/* ══════════════════════════════════════
   SAVE POST
══════════════════════════════════════ */
function savePost(status) {
  const title = document.getElementById('modalTitle').value.trim();
  const content = getContent().trim();

  if (!title)   { showToast('Please add a title'); return; }
  if (!content) { showToast('Content is empty'); return; }

  const post = {
    id:        Date.now(),
    title,
    content,
    excerpt:   document.getElementById('modalExcerpt').value.trim(),
    status:    status || document.getElementById('modalStatus').value,
    tags:      [...tags],
    createdAt: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
  };

  posts.unshift(post); // add to top of list
  renderTable();
  closeModal();
  showToast(status === 'published' ? 'Post published!' : 'Draft saved!');

  console.log('POST payload (send this to FastAPI):', {
    title:   post.title,
    content: post.content,
    excerpt: post.excerpt,
    status:  post.status,
    tags:    post.tags,
  });

  /* ── Uncomment when Manav's API is ready ──
  fetch('http://localhost:8000/posts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: post.title, content: post.content, excerpt: post.excerpt, status: post.status, tags: post.tags })
  }).then(r => r.json()).then(d => showToast('Saved! id=' + d.id));
  */
}

/* ══════════════════════════════════════
   RENDER POSTS TABLE
══════════════════════════════════════ */
function renderTable() {
  const tbody = document.getElementById('postsTableBody');
  const empty = document.getElementById('emptyState');
  document.getElementById('postCountLabel').textContent = posts.length + (posts.length === 1 ? ' post' : ' posts');

  if (posts.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = posts.map(p => `
    <tr>
      <td>
        <div class="post-title">${escHtml(p.title)}</div>
        ${p.excerpt ? `<div class="post-excerpt">${escHtml(p.excerpt)}</div>` : ''}
      </td>
      <td><span class="status-badge ${p.status}">${p.status}</span></td>
      <td>${p.tags.map(t => `<span class="tag-pill">${escHtml(t)}</span>`).join('') || '—'}</td>
      <td style="color:#888;font-size:12px">${p.createdAt}</td>
      <td>
        <div class="row-actions">
          <button class="btn btn-ghost btn-sm" onclick="deletePost(${p.id})">Delete</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function deletePost(id) {
  posts = posts.filter(p => p.id !== id);
  renderTable();
  showToast('Post deleted');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ══════════════════════════════════════
   HTML → MARKDOWN
══════════════════════════════════════ */
function htmlToMarkdown(html) {
  const doc = new DOMParser().parseFromString(`<body>${html}</body>`, 'text/html');
  return walkNode(doc.body).trim();
}
function walkNode(node) {
  if (node.nodeType === Node.TEXT_NODE) return node.textContent;
  if (node.nodeType !== Node.ELEMENT_NODE) return '';
  const tag = node.tagName.toLowerCase();
  const inner = () => Array.from(node.childNodes).map(walkNode).join('');
  switch(tag) {
    case 'h1': return `\n# ${inner()}\n`;
    case 'h2': return `\n## ${inner()}\n`;
    case 'h3': return `\n### ${inner()}\n`;
    case 'p':  return `\n${inner()}\n`;
    case 'br': return '\n';
    case 'strong': case 'b': return `**${inner()}**`;
    case 'em':     case 'i': return `*${inner()}*`;
    case 'u':  return `__${inner()}__`;
    case 's': case 'strike': case 'del': return `~~${inner()}~~`;
    case 'blockquote': return `\n> ${inner().trim()}\n`;
    case 'code': return `\`${inner()}\``;
    case 'pre':  return `\n\`\`\`\n${node.textContent}\n\`\`\`\n`;
    case 'hr':   return '\n---\n';
    case 'a':    return `[${inner()}](${node.getAttribute('href')||''})`;
    case 'ul':   return '\n' + Array.from(node.children).map(li=>`- ${walkNode(li).trim()}`).join('\n') + '\n';
    case 'ol':   return '\n' + Array.from(node.children).map((li,i)=>`${i+1}. ${walkNode(li).trim()}`).join('\n') + '\n';
    case 'li':   return inner();
    case 'div':  return `\n${inner()}`;
    default:     return inner();
  }
}

/* ══════════════════════════════════════
   MARKDOWN → HTML
══════════════════════════════════════ */
function markdownToHtml(md) {
  const lines = md.split('\n'); const out = []; let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith('```')) {
      const cl=[]; i++;
      while(i<lines.length && !lines[i].startsWith('```')){ cl.push(escHtml(lines[i])); i++; }
      out.push(`<pre><code>${cl.join('\n')}</code></pre>`); i++; continue;
    }
    const h1=line.match(/^# (.+)/),h2=line.match(/^## (.+)/),h3=line.match(/^### (.+)/);
    if(h1){out.push(`<h1>${inl(h1[1])}</h1>`);i++;continue;}
    if(h2){out.push(`<h2>${inl(h2[1])}</h2>`);i++;continue;}
    if(h3){out.push(`<h3>${inl(h3[1])}</h3>`);i++;continue;}
    if(line.startsWith('> ')){
      const ql=[]; while(i<lines.length&&lines[i].startsWith('> ')){ql.push(lines[i].slice(2));i++;}
      out.push(`<blockquote>${inl(ql.join('<br>'))}</blockquote>`); continue;
    }
    if(/^[-*+] /.test(line)){
      const it=[]; while(i<lines.length&&/^[-*+] /.test(lines[i])){it.push(`<li>${inl(lines[i].replace(/^[-*+] /,''))}</li>`);i++;}
      out.push(`<ul>${it.join('')}</ul>`); continue;
    }
    if(/^\d+\. /.test(line)){
      const it=[]; while(i<lines.length&&/^\d+\. /.test(lines[i])){it.push(`<li>${inl(lines[i].replace(/^\d+\. /,''))}</li>`);i++;}
      out.push(`<ol>${it.join('')}</ol>`); continue;
    }
    if(/^(-{3,}|\*{3,})$/.test(line.trim())){out.push('<hr>');i++;continue;}
    if(line.trim()===''){out.push('');i++;continue;}
    out.push(`<p>${inl(line)}</p>`); i++;
  }
  return out.join('\n');
}
function inl(t){
  return t
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>')
    .replace(/__(.+?)__/g,'<u>$1</u>');
}

// Init
renderTable();
</script>
